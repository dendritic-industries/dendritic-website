<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dendritic Industries</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .tagline {
      position: absolute;
      top: 2rem;
      left: 2.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: right;
      line-height: 1.6;
      opacity: 0.75;
    }

    .contact {
      font-size: 1.2rem;
      letter-spacing: 0.05em;
    }

    .location {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="tagline">The future of American manufacturing is coming.</div>
  <p class="contact">Contact us at contact@dendritic.industries</p>
  <div class="location">Pittsburgh, Pennsylvania, USA</div>
</body>
</html>
